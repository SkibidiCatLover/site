<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>niss</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0a0a0a;
      font-family: "Georgia", "Times New Roman", serif;
      color: #ccc;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.02) 0px,
          rgba(255,255,255,0.02) 1px,
          transparent 1px,
          transparent 2px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.015) 0px,
          rgba(255,255,255,0.015) 1px,
          transparent 1px,
          transparent 2px
        );
      pointer-events: none;
    }

    .container {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding-top: 20vh;
      text-align: center;
    }

    .text {
      font-size: 20px;
      letter-spacing: 1px;
      color: #bfbfbf;
      animation: fadeIn 1.5s ease forwards;
      opacity: 0;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }

    .buttons a {
      text-decoration: none;
      color: #ccc;
      border: 1px solid #444;
      padding: 10px 18px;
      font-size: 14px;
      letter-spacing: 1px;
      transition: all 0.2s ease;
      background: rgba(255,255,255,0.02);
    }

    .buttons a:hover {
      background: rgba(255,255,255,0.08);
      border-color: #777;
      color: #fff;
    }

    @keyframes fadeIn {
      to {
        opacity: 0.9;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="text">[ Under Construction ]</div>

    <div class="buttons">
      <a href="https://twitch.tv/7niss" target="_blank">Twitch</a>
      <a href="https://roles.tv/u/7niss" target="_blank">MLU</a>
      <a href="mailto:contact@niss.dev">Contact</a>
    </div>
  </div>
</body>
</html>
